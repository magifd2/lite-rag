name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-darwin:
    name: Build darwin (${{ matrix.goarch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            cc: ""
          - goarch: amd64
            cc: "clang -arch x86_64"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p bin
          go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/lite-rag-darwin-${{ matrix.goarch }} \
            ./cmd/lite-rag

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-rag-darwin-${{ matrix.goarch }}
          path: bin/lite-rag-darwin-${{ matrix.goarch }}

  build-linux:
    name: Build linux (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: ""
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p bin
          go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o bin/lite-rag-linux-${{ matrix.goarch }} \
            ./cmd/lite-rag

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lite-rag-linux-${{ matrix.goarch }}
          path: bin/lite-rag-linux-${{ matrix.goarch }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

  release:
    name: Release
    needs: [build-darwin, build-linux, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
